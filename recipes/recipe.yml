# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: alfatangos
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bluefin
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: / 

  - type: nvidia
  version: 580

  - type: default-flatpaks
    configurations:
      - notify: true 
        scope: system
        install: 
          - org.mozilla.firefox
      - scope: user 

  - type: signing 

  - type: containerfile
    snippets:
      - |
        RUN echo "MOZ_DISABLE_RDD_SANDBOX=1" >> /etc/environment
        RUN echo "LIBVA_DRIVER_NAME=nvidia" >> /etc/environment
        RUN echo "__GLX_VENDOR_LIBRARY_NAME=nvidia" >> /etc/environment
        RUN echo "MOZ_ENABLE_WAYLAND=1" >> /etc/environment
