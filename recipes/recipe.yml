# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: alfatangos
description: This is my personal OS image.

base-image: ghcr.io/ublue-os/bluefin
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: / 

- type: rpm-ostree
    repos:
      # Aggiungiamo i repo RPM Fusion
      - https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm
      - https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
    install:
      # Specifichiamo i driver 580xx
      - akmod-nvidia-580xx
      - xorg-x11-drv-nvidia-580xx
      - xorg-x11-drv-nvidia-580xx-libs
      - xorg-x11-drv-nvidia-580xx-cuda
      - xorg-x11-drv-nvidia-580xx-cuda-libs
      - xorg-x11-drv-nvidia-580xx-libs.i686
      - libva-nvidia-driver
      - libva-nvidia-driver.i686
      - libva-utils
      - vdpauinfo
      - vulkan-loader
      - vulkan-loader.i686
      - vulkan-tools

  - type: default-flatpaks
    configurations:
      - notify: true 
        scope: system
        install: 
          - org.mozilla.firefox
      - scope: user 

  - type: signing 

  - type: containerfile
    snippets:
      - |
        RUN echo "MOZ_DISABLE_RDD_SANDBOX=1" >> /etc/environment
        RUN echo "LIBVA_DRIVER_NAME=nvidia" >> /etc/environment
        RUN echo "__GLX_VENDOR_LIBRARY_NAME=nvidia" >> /etc/environment
        RUN echo "MOZ_ENABLE_WAYLAND=1" >> /etc/environment
